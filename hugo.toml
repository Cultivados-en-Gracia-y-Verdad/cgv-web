baseURL = 'https://discipuladocgv.org/'
languageCode = 'es'
title = 'Discipulado CGV'
theme = "hugo-universal-theme"
PublishDir = "docs"
defaultContentLanguage = "es"
ShowBreadCrumbs = "true"
disqusShortname = "cgv"
googleAnalytics = ""
summaryLength = 70

[markup.goldmark.renderer]
 unsafe = true
 
pluralizelisttitles = false
enableInlineShortcodes = true
enableRobotsTXT = true

[outputs]
  home = ["HTML", "RSS", "JSON"]
  page = ["HTML"]
  section = ["HTML", "RSS"]
  taxonomy = ["HTML", "RSS"]
  term = ["HTML", "RSS"]

[sitemap]
  changefreq = "weekly"
  priority = 0.7
  filename = "sitemap.xml"

